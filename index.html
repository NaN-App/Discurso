<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#08394E">
    <meta name="description" content="Designação de Funções - Salão do Reino">
    <title>Designação de Funções - Salão do Reino</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="1000322334.png" type="image/png">
    <link rel="apple-touch-icon" href="1000322334.png">
    
    <!-- Importação da Fonte Cabin -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cabin:wght@400;500;600;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-main: #EEEEEE;
            --bg-header: #08394E;
            --primary-accent: #08394E;
            --text-light: #FFFFFF; 
            --text-muted: #0D9490;
            --bg-bottom-sheet: #EEEEEE;
            --card-white: #FFFFFF;
            --border-light: rgba(44, 42, 30, 0.06);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Cabin", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-light);
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- CABEÇALHO GLOBAL --- */
        .app-header {
            background-color: var(--bg-header);
            padding: 24px 20px 24px 20px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
            border-radius: 0 0 30px 30px;
            box-shadow: 0 7px 8px rgba(0, 0, 0, 0.7);
            z-index: 1000;
        }

        .header-content {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .titulo-principal {
            font-size: 30px;
            font-weight: 600;
            color: var(--text-light);
            letter-spacing: -0.5px;
            text-align: center;
            line-height: 1.2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 40px;
            width: 100%;
        }

        .carousel-semanas {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 4px 0 8px 0;
            scrollbar-width: none;
            min-height: 65px;
        }

        .carousel-semanas::-webkit-scrollbar {
            display: none;
        }

        .semana-card {
            flex: 0 0 105px;
            background: transparent;
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 10px 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .semana-card.ativa {
            background-color: var(--card-white);
            border-color: var(--card-white);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            transform: translateY(-2px);
        }

        /* --- CONTAINER DE CONTEÚDO --- */
        .app-carousel-viewport {
            display: flex;
            width: 100vw;
            flex-grow: 1;
            height: 0;
            overflow-x: hidden;
            overflow-y: hidden;
        }

        .app-page-slide {
            flex: 0 0 100vw;
            width: 100vw;
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .bottom-sheet {
            background-color: var(--bg-bottom-sheet);
            padding: 15px 13px 30px 13px;
            flex-grow: 1;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .cards-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 600px;
        }

        .card-funcao {
            background-color: var(--card-white);
            border-radius: 20px;
            padding: 20px 15px;
            box-shadow: 0px 8px 10px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 100px;
            border: 0px solid var(--border-light);
            border-left: 8px solid var(--bg-main);
            position: relative;
            overflow: hidden;
            transition: transform 0.2s ease;
        }

        .funcao-titulo {
            font-size: 19px;
            font-weight: 700;
            color: #08394E;
            align-self: flex-start;
        }

        .input-card {
            background: transparent;
            border: none;
            color: #141416;
            outline: none;
            flex: 1;
            min-width: 0;
            width: 100%;
            padding: 0;
            margin: 0;
        }

        .input-card::placeholder {
            color: #141416;
            opacity: 0.6;
        }
    </style>
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
        window.OneSignalDeferred = window.OneSignalDeferred || [];
        OneSignalDeferred.push(async function(OneSignal) {
            await OneSignal.init({
                appId: "9e1ba5be-58e8-414e-be13-fc6b2b3e1fa",
                notifyButton: {
                    enable: true,
                },
            });
        });
    </script>
</head>
<body>
    <header class="app-header">
        <div class="header-content">
            <h1 class="titulo-principal" id="app-titulo">Designação de Discurso Público</h1>
            <div class="carousel-semanas">
                <!-- Inserido via Javascript -->
            </div>
        </div>
    </header>

    <div class="app-carousel-viewport">
        <div class="app-page-slide" id="slide-weekend">
            <main class="bottom-sheet">
                <div class="cards-list">
                    
                    <!-- Card Discurso Público -->
                    <div class="card-funcao" style="min-height: auto; gap: 20px; padding: 20px 0; border-left-color: #2F6c82;">
                        <span class="funcao-titulo" style="display: flex; align-items: center; gap: 8px; padding: 0px 15px;">
                            <svg width="24px" height="24px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="#08394e"><path d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 13.5997 2.37562 15.1116 3.04346 16.4525C3.22094 16.8088 3.28001 17.2161 3.17712 17.6006L2.58151 19.8267C2.32295 20.793 3.20701 21.677 4.17335 21.4185L6.39939 20.8229C6.78393 20.72 7.19121 20.7791 7.54753 20.9565C8.88837 21.6244 10.4003 22 12 22Z" stroke="#08394E" stroke-width="2"></path><path d="M8 10.5H16" stroke="#08394E" stroke-width="2" stroke-linecap="round"></path><path d="M8 14H13.5" stroke="#08394E" stroke-width="2" stroke-linecap="round"></path></svg>
                            DISCURSO PÚBLICO
                        </span>
                        
                        <!-- Linha 1: Esboço e Data -->
                        <div style="display: flex; gap: 25px; width: 100%;">
                            <div style="display: flex; flex-direction: row; align-items: center; gap: 6px; flex: 1;">
                                <span style="font-size: 16px; padding: 0px 0px 0px 17px; font-weight: 500; color: var(--text-muted); letter-spacing: 0.3px; white-space: nowrap;">
                                    <svg width="24px" height="24px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="vertical-align: middle; padding: 0 5px 3px 0;"><path d="M18.18 8.03933L18.6435 7.57589C19.4113 6.80804 20.6563 6.80804 21.4241 7.57589C22.192 8.34374 22.192 9.58868 21.4241 10.3565L20.9607 10.82M18.18 8.03933L13.9194 12.2999C13.6308 12.5885 13.4865 12.7328 13.3624 12.8919C13.2161 13.0796 13.0906 13.2827 12.9882 13.4975C12.9014 13.6797 12.8368 13.8732 12.7078 14.2604L12.2946 15.5L12.1609 15.901M20.9607 10.82L16.7001 15.0806C16.4115 15.3692 16.2672 15.5135 16.1081 15.6376C15.9204 15.7839 15.7173 15.9094 15.5025 16.0118C15.3203 16.0986 15.1268 16.1632 14.7396 16.2922L13.5 16.7054L13.099 16.8391M13.099 16.8391L12.6979 16.9728C12.5074 17.0363 12.2973 16.9867 12.1553 16.8447C12.0133 16.7027 11.9637 16.4926 12.0272 16.3021L12.1609 15.901M13.099 16.8391L12.1609 15.901" stroke="#08394E" stroke-width="2"></path><path d="M8 13H10.5" stroke="#08394E" stroke-width="2" stroke-linecap="round"></path><path d="M8 9H14.5" stroke="#08394E" stroke-width="2" stroke-linecap="round"></path><path d="M8 17H9.5" stroke="#08394E" stroke-width="2" stroke-linecap="round"></path><path d="M19.8284 3.17157C18.6569 2 16.7712 2 13 2H11C7.22876 2 5.34315 2 4.17157 3.17157C3 4.34315 3 6.22876 3 10V14C3 17.7712 3 19.6569 4.17157 20.8284C5.34315 22 7.22876 22 11 22H13C16.7712 22 18.6569 22 19.8284 20.8284C20.7715 19.8853 20.9554 18.4796 20.9913 16" stroke="#08394E" stroke-width="2" stroke-linecap="round"></path></svg>ESBOÇO:</span>
                                <input type="number" id="input-esboco" class="input-card" data-field="esboco" style="text-align: left; font-weight: 400; padding: 0px 4px 3px 0px; font-size: 19px;" placeholder="•••">
                            </div>
                            <div style="display: flex; flex-direction: row; align-items: center; gap: 6px; flex: 1;">
                                <span style="font-size: 16px; font-weight: 500; color: var(--text-muted); letter-spacing: 0.3px; white-space: nowrap;">
                                    <svg width="24px" height="24px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="vertical-align: middle; padding: 0 5px 3px 0;"><g stroke="#08394e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></g></svg>DATA:</span>
                                <input type="text" id="input-data-custom" class="input-card" data-field="data" style="text-align: left; font-weight: 400; padding: 0px 4px 3px 0px; font-size: 19px;" placeholder="•••" readonly>
                            </div>
                        </div>
                        
                        <div style="width: 100%; height: 1px; background-color: rgba(0,0,0,0.06); margin: -2px 0;"></div>
                        
                        <!-- Linha 2: Tema -->
                        <div style="display: flex; flex-direction: column; gap: 2px; width: 100%;">
                            <span style="font-size: 16px; padding: 0px 17px; font-weight: 500; color: var(--text-muted); letter-spacing: 0.3px;">
                                <svg width="24px" height="24px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="vertical-align: middle; padding: 0 5px 3px 0;"><path d="M3 10C3 6.22876 3 4.34315 4.17157 3.17157C5.34315 2 7.22876 2 11 2H13C16.7712 2 18.6569 2 19.8284 3.17157C21 4.34315 21 6.22876 21 10V14C21 17.7712 21 19.6569 19.8284 20.8284C18.6569 22 16.7712 22 13 22H11C7.22876 22 5.34315 22 4.17157 20.8284C3 19.6569 3 17.7712 3 14V10Z" stroke="#08394e" stroke-width="2"></path><path d="M8 12H16" stroke="#08394e" stroke-width="2" stroke-linecap="round"></path><path d="M8 8H16" stroke="#08394e" stroke-width="2" stroke-linecap="round"></path><path d="M8 16H13" stroke="#08394e" stroke-width="2" stroke-linecap="round"></path></svg>TEMA</span>
                            <div id="area-tema" class="nome-irmao" data-field="tema" style="text-align: left; font-size: 22px; padding: 0px 17px; font-weight: 500; line-height: 1.3; color: #141416;">•••</div>
                        </div>
                        
                        <div style="width: 100%; height: 1px; background-color: rgba(0,0,0,0.06); margin: -2px 0;"></div>
                        
                        <!-- Linha 3: Orador e Congregação -->
                        <div style="display: flex; gap: 16px; width: 100%;">
                            <div style="display: flex; flex-direction: column; gap: 2px; flex: 1;">
                                <span style="font-size: 16px; padding: 0px 17px; font-weight: 500; color: var(--text-muted); letter-spacing: 0.3px;">
                                    <svg width="24px" height="24px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="vertical-align: middle; padding: 0 4px 3px 0;"><circle cx="10" cy="6" r="4" stroke="#08394e" stroke-width="2"></circle><path d="M18 17.5C18 19.9853 18 22 10 22C2 22 2 19.9853 2 17.5C2 15.0147 5.58172 13 10 13C14.4183 13 18 15.0147 18 17.5Z" stroke="#08394e" stroke-width="2"></path><path d="M19 2C19 2 21 3.2 21 6C21 8.8 19 10 19 10" stroke="#08394e" stroke-width="2" stroke-linecap="round"></path><path d="M17 4C17 4 18 4.6 18 6C18 7.4 17 8 17 8" stroke="#08394e" stroke-width="2" stroke-linecap="round"></path></svg>ORADOR</span>
                                <input type="text" class="input-card" data-field="orador" style="text-align: left; font-weight: 500; padding: 0px 17px; font-size: 19px;" placeholder="•••">
                            </div>
                            <div style="display: flex; flex-direction: column; gap: 2px; flex: 1;">
                                <span style="font-size: 16px; font-weight: 500; color: var(--text-muted); letter-spacing: 0.3px;">
                                    <svg width="25px" height="25px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="vertical-align: middle; padding: 0 4px 5px 0;"><path d="M22 22L2 22" stroke="#08394e" stroke-width="2" stroke-linecap="round"></path><path d="M2 11L10.1259 4.49931C11.2216 3.62279 12.7784 3.62279 13.8741 4.49931L22 11" stroke="#08394e" stroke-width="2" stroke-linecap="round"></path><path d="M4 22V9.5" stroke="#08394e" stroke-width="2" stroke-linecap="round"></path><path d="M20 22V9.5" stroke="#08394e" stroke-width="2" stroke-linecap="round"></path><path d="M15 22V17C15 15.5858 15 14.8787 14.5607 14.4393C14.1213 14 13.4142 14 12 14C10.5858 14 9.87868 14 9.43934 14.4393C9 14.8787 9 15.5858 9 17V22" stroke="#08394e" stroke-width="2"></path></svg>CONGREGAÇÃO</span>
                                <input type="text" class="input-card" data-field="congregacao" style="text-align: left; font-weight: 400; font-size: 19px; padding: 0px 4px 3px 0px;" placeholder="•••">
                            </div>
                        </div>

                        <div style="width: 100%; height: 1px; background-color: rgba(0,0,0,0.06); margin: -2px 0;"></div>

                        <!-- Linha 4: Endereço (Auto-ajustável) -->
                        <div style="display: flex; flex-direction: column; gap: 2px; width: 100%;">
                            <span style="font-size: 16px; padding: 0px 17px; font-weight: 500; color: var(--text-muted); letter-spacing: 0.3px;">
                                <svg width="24px" height="24px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="vertical-align: middle; padding: 0 5px 3px 0;"><g stroke="#08394e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-9-6-9-11a9 9 0 0 1 18 0c0 5-9 11-9 11z"/><circle cx="12" cy="10" r="3"/></g></svg>ENDEREÇO</span>
                            <textarea id="textarea-endereco" class="input-card" data-field="endereco" style="text-align: left; font-size: 19px; padding: 0px 17px; font-weight: 400; line-height: 1.3; resize: none; overflow: hidden; height: auto;" rows="1" placeholder="•••"></textarea>
                        </div>

                    </div>

                </div>
            </main>
        </div>
    </div>

    <input type="date" id="hidden-date-picker" style="position: absolute; width: 0; height: 0; opacity: 0; pointer-events: none;">

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // --- CONTROLE DE DATAS ---
            const displayInput = document.getElementById('input-data-custom');
            const hiddenPicker = document.getElementById('hidden-date-picker');
            
            const mesesSimplificados = [
                'Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun',
                'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'
            ];

            displayInput.addEventListener('click', function() {
                if (typeof hiddenPicker.showPicker === 'function') {
                    hiddenPicker.showPicker();
                } else {
                    hiddenPicker.focus();
                }
            });

            hiddenPicker.addEventListener('change', function() {
                if (this.value) {
                    const partes = this.value.split('-');
                    const dia = parseInt(partes[2], 10);
                    const mesIndex = parseInt(partes[1], 10) - 1;
                    displayInput.value = `${dia} de ${mesesSimplificados[mesIndex]}`;
                } else {
                    displayInput.value = '';
                }
            });

            // --- AUTO-AJUSTE DA ALTURA DO ENDEREÇO ---
            const txEndereco = document.getElementById('textarea-endereco');
            txEndereco.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = this.scrollHeight + 'px';
            });

            // --- INTEGRACÃO DINÂMICA COM O GOOGLE SHEETS (TSV) ---
            const inputEsboco = document.getElementById('input-esboco');
            const areaTema = document.getElementById('area-tema');
            let bancoDeTemas = {};

            // Link da sua base de dados fornecida
            const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRGAcOIMZpt2HD2XMZWqEnV5QjF7322mxVRjI-s3hsGsSzAw6T45pGhCczn0tNzQUQeYcnQ4R3SCyAS/pub?gid=1453510933&single=true&output=tsv";

            async function carregarDadosPlanilha() {
                try {
                    const resposta = await fetch(sheetUrl);
                    const tsvTexto = await resposta.text();
                    
                    // Divide o arquivo por linhas
                    const linhas = tsvTexto.split('\n');
                    
                    linhas.forEach(linha => {
                        // Divide cada linha pelas tabulações (\t) do TSV
                        const colunas = linha.split('\t');
                        if (colunas.length >= 2) {
                            const numero = colunas[0].trim();
                            const temaOriginal = colunas[1].trim();
                            
                            if (numero && temaOriginal) {
                                bancoDeTemas[numero] = temaOriginal;
                            }
                        }
                    });
                    console.log("Planilha integrada com sucesso!");
                } catch (erro) {
                    console.error("Erro ao carregar planilha externa: ", erro);
                    areaTema.textContent = "Erro ao conectar à planilha";
                }
            }

            // Executa a busca na planilha assim que o app inicia
            carregarDadosPlanilha();

            // Gerencia a digitação do número do esboço
            inputEsboco.addEventListener('input', function() {
                const numeroDigitado = this.value.trim();

                if (numeroDigitado === "") {
                    areaTema.textContent = "•••";
                } else if (bancoDeTemas[numeroDigitado]) {
                    areaTema.textContent = bancoDeTemas[numeroDigitado];
                } else {
                    areaTema.textContent = "Esboço não cadastrado";
                }
            });
        });
    </script>
</body>
</html>
