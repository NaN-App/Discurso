<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#08394E">
    <meta name="description" content="Designação de Funções - Salão do Reino">
    <title>Designação de Funções - Salão do Reino</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="1000322334.png" type="image/png">
    <link rel="apple-touch-icon" href="1000322334.png">
    
    <!-- Importação da Fonte Cabin -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cabin:wght@400;500;600;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-main: #EEEEEE;
            --bg-header: #08394E;
            --primary-accent: #08394E;
            --text-light: #FFFFFF; 
            --text-muted: #0D9490;
            --bg-bottom-sheet: #EEEEEE;
            --card-white: #FFFFFF;
            --border-light: rgba(44, 42, 30, 0.06);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Cabin", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-light);
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- CABEÇALHO GLOBAL --- */
        .app-header {
            background-color: var(--bg-header);
            padding: 24px 20px 24px 20px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
            border-radius: 0 0 30px 30px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.7);
            z-index: 1000;
        }

        .header-content {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .titulo-principal {
            font-size: 40px;
            font-weight: 600;
            color: var(--text-light);
            letter-spacing: -0.5px;
            text-align: center;
            line-height: 1.2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 40px;
            width: 100%;
        }

        /* --- CONTAINER DE CONTEÚDO --- */
        .app-carousel-viewport {
            display: flex;
            width: 100vw;
            flex-grow: 1;
            height: 0;
            overflow-x: hidden;
            overflow-y: hidden;
        }

        .app-page-slide {
            flex: 0 0 100vw;
            width: 100vw;
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .bottom-sheet {
            background-color: var(--bg-bottom-sheet);
            padding: 15px 15px 15px 13px;
            flex-grow: 1;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .cards-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            max-width: 600px;
        }

        .card-funcao {
            background-color: var(--card-white);
            border-radius: 20px;
            padding: 20px 10px;
            box-shadow: 0px 8px 10px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 100px;
            border: 0px solid var(--border-light);
            border-left: 8px solid var(--bg-main);
            position: relative;
            overflow: hidden;
            transition: transform 0.2s ease;
        }

        .funcao-titulo {
            font-size: 19px;
            font-weight: 700;
            color: #08394E;
            align-self: flex-start;
        }

        .input-card {
            background: transparent;
            border: none;
            color: #141416;
            outline: none;
            flex: 1;
            min-width: 0;
            width: 100%;
            padding: 0;
            margin: 0;
        }

        .input-card::placeholder {
            color: #141416;
            opacity: 0.6;
        }
    </style>
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
        window.OneSignalDeferred = window.OneSignalDeferred || [];
        OneSignalDeferred.push(async function(OneSignal) {
            await OneSignal.init({
                appId: "9e1ba5be-58e8-414e-be13-fc6b2b3e1fa",
                notifyButton: {
                    enable: true,
                },
            });
        });
    </script>
</head>
<body>
    <header class="app-header">
        <div class="header-content">
            <h1 class="titulo-principal" id="app-titulo">Designação de Discurso Público</h1>
            <div class="carousel-semanas">
                <!-- Inserido via Javascript -->
            </div>
        </div>
    </header>

    <div class="app-carousel-viewport">
        <div class="app-page-slide" id="slide-weekend">
            <main class="bottom-sheet">
                <div class="cards-list">
                    
                    <!-- Card Discurso Público -->

                            DISCURSO PÚBLICO
                        </span>
                        
                        <!-- Linha 1: Apenas a Data (largura total) -->

                            <input type="text" id="input-data-custom" class="input-card-save" data-field="data" style="text-align: left; font-weight: 500; padding: 0px 4px 3px 0px; font-size: 19px; background: transparent; border: none; color: #141416; outline: none; flex: 1; min-width: 0; width: 100%; cursor: pointer;" placeholder="•••" readonly>
                        </div>
                        
                        <div style="width: 100%; height: 1px; background-color: rgba(0,0,0,0.06); margin: -2px 0;"></div>
                        
                        <!-- Linha 2: Cabeçalho do Tema -->
                        <div style="display: flex; align-items: center; gap: 8px; width: 100%; padding: 0px 14px;">
                            <!-- Label TEMA -->
                            <span style="font-size: 17px; font-weight: 500; color: var(--text-muted); letter-spacing: 0.3px; display: flex; align-items: center;">
                                <svg width="24px" height="24px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="vertical-align: middle; padding: 0 5px 0px 0;"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"> <path d="M18.18 8.03933L18.6435 7.57589C19.4113 6.80804 20.6563 6.80804 21.4241 7.57589C22.192 8.34374 22.192 9.58868 21.4241 10.3565L20.9607 10.82M18.18 8.03933C18.18 8.03933 18.238 9.02414 19.1069 9.89309C19.9759 10.762 20.9607 10.82 20.9607 10.82M18.18 8.03933L13.9194 12.2999C13.6308 12.5885 13.4865 12.7328 13.3624 12.8919C13.2161 13.0796 13.0906 13.2827 12.9882 13.4975C12.9014 13.6797 12.8368 13.8732 12.7078 14.2604L12.2946 15.5L12.1609 15.901M20.9607 10.82L16.7001 15.0806C16.4115 15.3692 16.2672 15.5135 16.1081 15.6376C15.9204 15.7839 15.7173 15.9094 15.5025 16.0118C15.3203 16.0986 15.1268 16.1632 14.7396 16.2922L13.5 16.7054L13.099 16.8391M13.099 16.8391L12.6979 16.9728C12.5074 17.0363 12.2973 16.9867 12.1553 16.8447C12.0133 16.7027 11.9637 16.4926 12.0272 16.3021L12.1609 15.901M13.099 16.8391L12.1609 15.901" stroke="#08394e" stroke-width="2"></path> <path d="M8 13H10.5" stroke="#08394e" stroke-width="2" stroke-linecap="round"></path> <path d="M8 9H14.5" stroke="#08394e" stroke-width="2" stroke-linecap="round"></path> <path d="M8 17H9.5" stroke="#08394e" stroke-width="2" stroke-linecap="round"></path> <path d="M19.8284 3.17157C18.6569 2 16.7712 2 13 2H11C7.22876 2 5.34315 2 4.17157 3.17157C3 4.34315 3 6.22876 3 10V14C3 17.7712 3 19.6569 4.17157 20.8284C5.34315 22 7.22876 22 11 22H13C16.7712 22 18.6569 22 19.8284 20.8284C20.7715 19.8853 20.9554 18.4796 20.9913 16" stroke="#08394e" stroke-width="2" stroke-linecap="round"></path> </g></svg>ESBOÇO:</span>

                        </div>

                        <!-- Texto Descritivo do Tema posicionado logo abaixo -->

                        <div style="width: 100%; height: 1px; background-color: rgba(0,0,0,0.06); margin: -2px 0;"></div>

                            <div style="display: flex; flex-direction: column; gap: 2px; flex: 1;">

    <!-- Seletor alterado para datetime-local (Data e Hora) -->
    <input type="datetime-local" id="hidden-date-picker" style="position: absolute; width: 0; height: 0; opacity: 0; pointer-events: none;">

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // --- CONTROLE DE DATAS E HORAS ---
            const displayInput = document.getElementById('input-data-custom');
            const hiddenPicker = document.getElementById('hidden-date-picker');
            
            const mesesSimplificados = [
                'Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun',
                'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'
            ];
            const diasSemana = ['Domingo', 'Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta', 'Sábado'];

            displayInput.addEventListener('click', function() {
                if (typeof hiddenPicker.showPicker === 'function') {
                    hiddenPicker.showPicker();
                } else {
                    hiddenPicker.focus();
                }
            });

            hiddenPicker.addEventListener('change', function() {
                if (this.value) {
                    // Espera formato "YYYY-MM-DDTHH:mm"
                    const partesGerais = this.value.split('T');
                    const dataPartes = partesGerais[0].split('-');
                    const horaPartes = partesGerais[1].split(':');

                    const ano = parseInt(dataPartes[0], 10);
                    const mes = parseInt(dataPartes[1], 10) - 1;
                    const dia = parseInt(dataPartes[2], 10);
                    
                    const hora = parseInt(horaPartes[0], 10);
                    const minuto = parseInt(horaPartes[1], 10);

                    // Cria data para descobrir o dia da semana correto
                    const dataObj = new Date(ano, mes, dia, hora, minuto);

                    const diaNum = dia;
                    const mesNome = mesesSimplificados[mes];
                    const diaSemanaNome = diasSemana[dataObj.getDay()];
                    
                    const horaStr = String(hora).padStart(2, '0');
                    const minutoStr = String(minuto).padStart(2, '0');

                    // Resultado retornado: "29 de Nov - Domingo 18h30"
                    displayInput.value = `${diaNum} de ${mesNome} - ${diaSemanaNome} ${horaStr}h${minutoStr}`;
                } else {
                    displayInput.value = '';
                }
                salvarDadosFormulario();
            });

            // --- AUTO-AJUSTE DA ALTURA DO ENDEREÇO ---
            const txEndereco = document.getElementById('textarea-endereco');
            function ajustarAlturaEndereco() {
                txEndereco.style.height = 'auto';
                txEndereco.style.height = txEndereco.scrollHeight + 'px';
            }
            txEndereco.addEventListener('input', ajustarAlturaEndereco);

            // --- INTEGRACÃO DINÂMICA COM O GOOGLE SHEETS (TSV) ---
            const inputEsboco = document.getElementById('input-esboco');
            const areaTema = document.getElementById('area-tema');
            let bancoDeTemas = {};

            // Link da sua base de dados fornecida
            const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRGAcOIMZpt2HD2XMZWqEnV5QjF7322mxVRjI-s3hsGsSzAw6T45pGhCczn0tNzQUQeYcnQ4R3SCyAS/pub?gid=1453510933&single=true&output=tsv";

            async function carregarDadosPlanilha() {
                try {
                    const resposta = await fetch(sheetUrl);
                    const tsvTexto = await resposta.text();
                    
                    // Divide o arquivo por linhas
                    const linhas = tsvTexto.split('\n');
                    
                    linhas.forEach(linha => {
                        const colunas = linha.split('\t');
                        if (colunas.length >= 2) {
                            const numero = colunas[0].trim();
                            const temaOriginal = colunas[1].trim();
                            
                            if (numero && temaOriginal) {
                                bancoDeTemas[numero] = temaOriginal;
                            }
                        }
                    });
                    console.log("Planilha integrada com sucesso!");
                    
                    // Após baixar a planilha, atualiza o tema se houver um esboço previamente salvo
                    atualizarTemaComEsboco();
                } catch (erro) {
                    console.error("Erro ao carregar planilha externa: ", erro);
                    areaTema.textContent = "Erro ao conectar à planilha";
                }
            }

            function atualizarTemaComEsboco() {
                const numeroDigitado = inputEsboco.value.trim();
                if (numeroDigitado === "") {
                    areaTema.textContent = "•••";
                } else if (bancoDeTemas[numeroDigitado]) {
                    areaTema.textContent = bancoDeTemas[numeroDigitado];
                } else {
                    areaTema.textContent = "Esboço não cadastrado";
                }
                // Salva o estado atual do tema no localStorage
                localStorage.setItem('form_designacao_tema', areaTema.textContent);
            }

            // Gerencia a digitação do número do esboço
            inputEsboco.addEventListener('input', atualizarTemaComEsboco);

            // --- FUNÇÕES DE SALVAMENTO LOCAL (LOCALSTORAGE) ---
            const inputsParaSalvar = document.querySelectorAll('.input-card-save');
            
            function salvarDadosFormulario() {
                inputsParaSalvar.forEach(input => {
                    const campo = input.getAttribute('data-field');
                    if (campo) {
                        localStorage.setItem('form_designacao_' + campo, input.value);
                    }
                });
                // Salva também o campo oculto de data para o seletor nativo não resetar
                localStorage.setItem('form_designacao_picker_date', hiddenPicker.value);
            }

            function carregarDadosFormulario() {
                inputsParaSalvar.forEach(input => {
                    const campo = input.getAttribute('data-field');
                    if (campo) {
                        const valorSalvo = localStorage.getItem('form_designacao_' + campo);
                        if (valorSalvo !== null) {
                            input.value = valorSalvo;
                        }
                    }
                });
                
                // Restaura o valor oculto do datepicker
                const pickerSalvo = localStorage.getItem('form_designacao_picker_date');
                if (pickerSalvo) {
                    hiddenPicker.value = pickerSalvo;
                }

                // Restaura o tema textual de forma temporária enquanto a planilha não carrega
                const temaSalvo = localStorage.getItem('form_designacao_tema');
                if (temaSalvo) {
                    areaTema.textContent = temaSalvo;
                }

                // Ajusta a altura da caixa de endereço baseado no texto recuperado
                ajustarAlturaEndereco();
            }

            // Adiciona ouvintes de evento para salvar os dados à medida que o usuário digita
            inputsParaSalvar.forEach(input => {
                input.addEventListener('input', salvarDadosFormulario);
            });

            // Carrega os dados persistidos e inicia a planilha
            carregarDadosFormulario();
            carregarDadosPlanilha();
        });
        
        // Registro do Service Worker para permitir a instalação (PWA)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker registrado com sucesso!', reg))
                    .catch(err => console.error('Falha ao registrar o Service Worker:', err));
            });
        }
    </script>
